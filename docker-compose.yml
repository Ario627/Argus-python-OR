version: '3.9'

services:
  solver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: argus-solver
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      HOST: 0.0.0.0
      MOCK_MODE: "false"
      LOG_LEVEL: INFO
      SOLVER_TIME_LIMIT_DAILY_MS: 30000
      SOLVER_TIME_LIMIT_RECOVERY_MS: 5000
      LOW_VOLUME_SKIP_PENALTY: 100
      MANDATORY_PENALTY: 1000000
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
    networks:
      - argus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  argus-network:
    driver: bridge
